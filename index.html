<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Input</title>
</head>
<body>
    <h1>Attendance Input Page</h1>
    <form>
        <label for="student-name">Student Name:</label><br>
        <input type="text" id="student-name" name="student-name" required><br><br>
        <label for="attendance-status">Attendance Status:</label><br>
        <select id="attendance-status" name="attendance-status" required>
            <option value="present">Present</option>
            <option value="absent">Absent</option>
        </select><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
